<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABR | MOVE</title>
<style>
  :root { --bg:#0a0a0a; --line:#232323; --gray2:#a3a3a3; --gray3:#737373; --accent:#0891B2; }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap { display: flex; flex-direction: column; align-items: center; gap: 48px; max-width: 480px; }
  img.logo { height: 96px; width: auto; filter: invert(1); }
  .tagline { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 14px; color: var(--gray2); line-height: 1.6; margin: 0; }
  .badge { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  .badge-text { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }
  .divider { width: 1px; height: 32px; background: var(--line); }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-size: 14px; text-decoration: none; border: 1px solid var(--line); color: #fff; transition: background .15s; }
  .btn:hover { background: #161616; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/logo.png" alt="ABR | MOVE">
    <div style="display:flex; flex-direction:column; gap:12px;">
      <p class="tagline">Инструменты для проектирования дорог<br>в Топоматик Robur и Civil 3D</p>
      <div class="badge">
        <span class="dot"></span>
        <span class="badge-text">Технические работы</span>
      </div>
    </div>
    <div class="divider"></div>
    <a class="btn" href="https://github.com/Y-Abramov" target="_blank" rel="noopener noreferrer">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor">

      Модули на GitHub
    </a>
  </div>
</body>
</html>
