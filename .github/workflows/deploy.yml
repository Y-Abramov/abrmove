name: Deploy to Yandex Object Storage

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-central1
      # Optional: set once functions/download-counter is deployed (not a secret,
      # it's the public invoke URL) — Settings > Actions > Variables. Unset is fine,
      # downloadHref() falls back to direct links with no count.
      PUBLIC_COUNTER_URL: ${{ vars.PUBLIC_COUNTER_URL }}
      # Raises the GitHub Releases download-count fetch in Hero.astro from 60/hr
      # (shared across all Actions runners, easily exhausted) to 5000/hr.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Sync hashed assets (long cache — filenames are content-hashed, safe to cache forever)
        run: |
          aws s3 sync ./dist s3://abrmove-modules \
            --endpoint-url https://storage.yandexcloud.net \
            --acl public-read \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "_astro/*"
      - name: Sync pages (no-cache — CDN must revalidate every request, or deploys never show up)
        run: |
          aws s3 sync ./dist s3://abrmove-modules \
            --endpoint-url https://storage.yandexcloud.net \
            --acl public-read --delete \
            --cache-control "no-cache" \
            --exclude "_astro/*" --exclude "catalog.json" --exclude "tpm/*"
